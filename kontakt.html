<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jele Studios</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atma:wght@300;400;500;600;700&family=Modak&display=swap"
      rel="stylesheet"
    />

    <link href="styles.css" rel="stylesheet" />
    <link rel="icon" href="icons/symbol512_transparent.ico" />
    <script src="index.js"></script>
  </head>
  <body>
    <header>
      <div class="logo-name">
        <a href="index.html">
          <img class="logo" src="icons/symbol512_transparent.png" />
        </a>
        <h1 style="font-size: 40px">Jele Studios</h1>
      </div>
      <nav id="nav">
        <div class="blog">
          <a href="blog.html"><h2>Blog</h2></a>
        </div>
        <div class="contact">
          <a href="kontakt.html"><h2>Kontakt</h2></a>
        </div>
        <div class="about">
          <a href="uebermich.html"><h2>Über mich</h2></a>
        </div>
        <div class="mobile-only">
          <hr style="border: 1px solid black; margin-inline: 20vw" />

          <div class="muted">
            <a href="Impressum.html"><h2>Impressum</h2></a>
          </div>
          <div class="muted">
            <a href="Datenschutz.html"><h2>Datenschutz</h2></a>
          </div>
          <div class="muted" style="justify-self: center">
            © Jele Studios 2026
          </div>
        </div>
      </nav>
      <button class="toggle">
        <img
          src="icons/icons8-menu-96.png"
          onClick="document.getElementById('nav').style.display == 'block' ? document.getElementById('nav').style.display = 'none' : document.getElementById('nav').style.display = 'block'"
        />
      </button>
    </header>

    <main id="main">
      <h2>Kontakt</h2>

      <h3>Socials</h3>

      <a href="https://discord.gg/z5Mra76WkE"
        ><img
          width="48"
          height="48"
          src="https://img.icons8.com/pulsar-line/48/discord-logo.png"
          alt="discord-logo"
      /></a>
      <a href="mailto:info@jelestudios.de"
        ><img
          width="48"
          height="48"
          src="https://img.icons8.com/pulsar-line/48/circled-envelope.png"
          alt="circled-envelope"
      /></a>

      <h3>Kontaktformular</h3>
      <form>
        <input
          name="name"
          type="text"
          class="feedback-input"
          placeholder="Name"
          autocomplete="name"
        />
        <input
          name="email"
          type="text"
          class="feedback-input"
          placeholder="Email"
          autocomplete="email"
        />
        <textarea
          name="text"
          class="feedback-input"
          placeholder="Nachricht"
        ></textarea>

        <input type="submit" value="ABSENDEN" />
      </form>
    </main>

    <footer>
      <div class="">
        <a target="_blank" href="https://icons8.com/icon/n6USRcw50J0j/website"
          >Website</a
        >,
        <a
          target="_blank"
          href="https://icons8.com/icon/AVfKlz7qPPxg/mobile-taxi-service"
          >mobile app</a
        >,
        <a
          target="_blank"
          href="https://icons8.com/icon/gp2EGUQ15At9/game-controller"
          >Game</a
        >
        icons by
        <a target="_blank" href="https://icons8.com">icons8</a>
      </div>
      <div class="row">
        <div class="muted">© Jele Studios 2026</div>
      </div>
      <div class="row">
        <div class="muted"><a href="Impressum.html">Impressum</a></div>
        <div class="muted"><a href="Datenschutz.html">Datenschutz</a></div>
      </div>
    </footer>
  </body>
</html>
